[workspace]
name = "stardist_napari_ai_lab"
authors = ["bnorthan <bnorthan@gmail.com>"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64"]
version = "0.1.0"

[system-requirements]
cuda = "12.0"

[dependencies]
napari = "0.6.6"
pyqt = "*"
ipykernel = "*"
setuptools = "<71"

[target.linux-64.dependencies]
python = "3.11.*"
__cuda = "*"  # This forces conda to select CUDA-enabled builds instead of CPU builds
tensorflow = { version = ">=2.0", build = "cuda*" }  # Explicitly request CUDA build of TensorFlow
stardist = "*"  # After tensorflow to prevent PyPI override
cudnn = "*"
cudatoolkit = "*"

[target.osx-arm64.dependencies]
python = "3.11.*"

[target.win-64.dependencies]
python = "3.10.*"  # Python 3.10 for Windows (TensorFlow compatibility)
# stardist pulled from PyPI on Windows (see below) — conda-forge only has py311 builds of 0.9+
cudatoolkit = "11.8.*"
cudnn = "8.1.0.*"
# numpy must be <2.0 because tensorflow <2.11 is not compatible with numpy 2.x
numpy = "<2.0"

[pypi-dependencies]
appose = "*"
PyQt5 = "*"
albumentations = "*"

# Use this to install from local folder in editable mode
#napari-easy-augment-batch-dl = { path = "C:/Users/bnort/work/ImageJ2022/tnia/napari-easy-augment-batch-dl", editable = true }

#napari-ai-lab = { git = "https://github.com/True-North-Intelligent-Algorithms/napari-ai-lab" }

# comment this in if you want to local editable install
napari-ai-lab = { path = "../../../napari-ai-lab", editable=true}
czifile = "*"
bioio-czi = "*"
pytest = "*"
ndevio = "*"

[target.win-64.pypi-dependencies]
tensorflow = "<2.11"
stardist = "<0.9"

[tasks]
# Register the environment as a Jupyter kernel for use in VS Code and Jupyter
register-kernel = "python -m ipykernel install --user --name=stardist8 --display-name 'AI-LAB (stardist8)'"
